name: pipeline

# Munca grea: fetch RSS + AI (buget per rulare) + salveaza starea in git.
# Commit-ul declanseaza Cloudflare Pages, care doar randeaza (vezi README).

on:
  schedule:
    - cron: "*/30 * * * *"      # la fiecare 30 min
  workflow_dispatch: {}          # buton „Run workflow" pentru rulare manuala

permissions:
  contents: write                # ca sa comita data/articles.json

concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Ruleaza pipeline (fetch + AI, buget)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AI_PROVIDER: gemini
          MAX_AI_CALLS_PER_RUN: "12"
        run: python -m generator.main

      - name: Comite starea (declanseaza deploy Cloudflare)
        run: |
          git config user.name "izz-bot"
          git config user.email "bot@izz.ro"
          git add data/articles.json
          git commit -m "update content [skip ci]" || echo "nimic de comis"
          git push || echo "nimic de impins"
