name: pipeline

# Munca grea: fetch RSS + AI (buget per rulare) + salveaza starea in git.
# Commit-ul declanseaza Cloudflare Pages, care doar randeaza (vezi README).

on:
  # La fiecare 2 ore. Fiecare commit al starii declanseaza un build Cloudflare
  # Pages, iar planul free are ~500 build-uri/luna: 12/zi = ~360/luna lasa
  # rezerva pentru merge-uri de PR. NU folosim mai des pentru ca ar epuiza
  # bugetul de build -> deploy-urile s-ar opri (exact bug-ul din 5-9 iul 2026,
  # cand commit-urile purtau [skip ci], onorat SI de Cloudflare -> site inghetat).
  schedule:
    - cron: "13 */2 * * *"
  workflow_dispatch: {}          # buton „Run workflow" pentru rulare manuala / deploy imediat

permissions:
  contents: write                # ca sa comita data/articles.json

concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Chromium pentru imagini (best-effort)
        id: chrome
        continue-on-error: true
        uses: browser-actions/setup-chrome@v1

      - name: Ruleaza pipeline (fetch + AI, buget)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AI_PROVIDER: gemini
          MAX_AI_CALLS_PER_RUN: "18"
          UPGRADE_RESERVE: "8"
          # Optional: ruteaza Gemini prin Cloudflare AI Gateway (cache/retry/observabilitate).
          # Activezi setand variabila de repo GEMINI_BASE_URL la URL-ul gateway-ului;
          # gol -> direct la Google (comportament neschimbat).
          GEMINI_BASE_URL: ${{ vars.GEMINI_BASE_URL }}
        run: python -m generator.main

      - name: Genereaza imagini per-articol (HTML/Chromium, best-effort)
        # Chromium NU exista in build-ul Cloudflare -> generam aici, comitem in media/.
        # non-fatal: daca pica, render.py cade pe Pillow -> site-ul nu se strica niciodata.
        continue-on-error: true
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
          MAX_IMAGES_PER_RUN: "80"
        run: python tools/gen_images.py

      - name: Portrete persoane publice (Wikidata, best-effort)
        continue-on-error: true
        env:
          MAX_PORTRAIT_LOOKUPS: "20"
        run: python tools/fetch_portraits.py

      - name: Fotografii lead per articol (Wikidata P18 landscape+PD, best-effort)
        # imaginea principala "foto" cand exista; non-fatal -> altfel coperta generata.
        # GEMINI_API_KEY activeaza judecatorul AI foto<->articol (photojudge); fara cheie
        # ramane pe regulile deterministe (echipe excluse). AI_PROVIDER=anthropic -> Claude.
        continue-on-error: true
        env:
          MAX_LEAD_LOOKUPS: "20"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AI_PROVIDER: gemini
        run: python tools/fetch_leadphotos.py

      - name: Comite starea (declanseaza deploy Cloudflare)
        # FARA [skip ci]: niciun workflow nu se declanseaza pe push (doar cron),
        # deci [skip ci] nu ne ajuta la Actions -- dar Cloudflare Pages IL onoreaza
        # si ar sari deploy-ul, inghetand site-ul. Vezi comentariul de la 'on:'.
        run: |
          git config user.name "izz-bot"
          git config user.email "bot@izz.ro"
          git add data/articles.json data/feed_cache.json
          git add data/portraits.json 2>/dev/null || true
          git add data/leadphotos.json 2>/dev/null || true
          git add media 2>/dev/null || true
          git commit -m "update content" || echo "nimic de comis"
          git push || echo "nimic de impins"

      - name: QA check (alerta daca scade calitatea publicabila)
        # ruleaza DUPA commit/deploy -> daca pica, owner-ul e anuntat de GitHub, dar site-ul nu ingheata
        run: python tools/qa_check.py
