name: pipeline

# Munca grea: fetch RSS + AI (buget per rulare) + salveaza starea in git.
# Commit-ul declanseaza Cloudflare Pages, care doar randeaza (vezi README).

on:
  # La fiecare 2 ore. Fiecare commit al starii declanseaza un build Cloudflare
  # Pages, iar planul free are ~500 build-uri/luna: 12/zi = ~360/luna lasa
  # rezerva pentru merge-uri de PR. NU folosim mai des pentru ca ar epuiza
  # bugetul de build -> deploy-urile s-ar opri (exact bug-ul din 5-9 iul 2026,
  # cand commit-urile purtau [skip ci], onorat SI de Cloudflare -> site inghetat).
  schedule:
    - cron: "13 */2 * * *"
  workflow_dispatch: {}          # buton „Run workflow" pentru rulare manuala / deploy imediat

permissions:
  contents: write                # ca sa comita data/articles.json

concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Ruleaza pipeline (fetch + AI, buget)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AI_PROVIDER: gemini
          MAX_AI_CALLS_PER_RUN: "18"
          UPGRADE_RESERVE: "8"
        run: python -m generator.main

      - name: Comite starea (declanseaza deploy Cloudflare)
        # FARA [skip ci]: niciun workflow nu se declanseaza pe push (doar cron),
        # deci [skip ci] nu ne ajuta la Actions -- dar Cloudflare Pages IL onoreaza
        # si ar sari deploy-ul, inghetand site-ul. Vezi comentariul de la 'on:'.
        run: |
          git config user.name "izz-bot"
          git config user.email "bot@izz.ro"
          git add data/articles.json data/feed_cache.json
          git commit -m "update content" || echo "nimic de comis"
          git push || echo "nimic de impins"

      - name: QA check (alerta daca scade calitatea publicabila)
        # ruleaza DUPA commit/deploy -> daca pica, owner-ul e anuntat de GitHub, dar site-ul nu ingheata
        run: python tools/qa_check.py
