name: Claude Code Review
on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read
    env:
      HAS_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
    steps:
      - name: Checkout repository
        if: env.HAS_TOKEN == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude review
        if: env.HAS_TOKEN == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this pull request. Focus on correctness, security, and missed
            edge cases. Post your review as a PR comment ending with a single
            verdict line: "VERDICT: APPROVE" or "VERDICT: NEEDS CHANGES",
            followed by a short numbered list of issues (if any).
            For every issue, include a concrete proposed fix (code snippet or
            diff), so the author can apply it or reply "@claude apply your
            fixes" to have you commit the changes on this branch.
          claude_args: '--allowed-tools "Bash(gh pr comment:*),Bash(gh pr view:*),Bash(gh pr diff:*)"'

      - name: Token missing notice
        if: env.HAS_TOKEN != 'true'
        run: echo "CLAUDE_CODE_OAUTH_TOKEN secret not set - skipping Claude review."
