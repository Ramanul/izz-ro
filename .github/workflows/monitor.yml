name: uptime-monitor

# Detectie externa, independenta de infrastructura de servire (ruleaza pe GitHub, la 10 min).
#
# Subtilitate: Cloudflare bot-fight-mode raspunde 403 IP-urilor de datacenter ale runnerului,
# desi siteul e 200 pentru useri reali cu browser. Un 403/503 de la edge DOVEDESTE ca frontul
# Cloudflare + DNS-ul sunt VII -> NU e outage. De aceea alertam (job rosu -> email owner) doar
# la cele doua dezastre reale pentru useri:
#   1) izz.ro nu raspunde DELOC (000) = DNS/edge/registrar cazut total;
#   2) ambele origini (Pages + mirror) jos = nimic de servit, nici prin failover.
# Restul (edge viu dar bot-block pe runner, o singura origine jos) = avertisment, job verde.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: monitor
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Verifica public + primar + mirror
        shell: bash
        run: |
          set +e
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"
          probe() {
            local code
            for _ in 1 2 3; do
              code=$(curl -sL -o /dev/null -w "%{http_code}" --max-time 25 -A "$UA" "$1" 2>/dev/null)
              [ "$code" = "200" ] && break
              sleep 5
            done
            echo "${code:-000}"
          }
          PUB=$(probe "https://izz.ro/")
          PRI=$(probe "https://izz-ro.pages.dev/")
          MIR=$(probe "https://ramanul.github.io/")
          echo "public izz.ro     : $PUB   (403 de la edge = bot-block pe runner, nu outage)"
          echo "primar pages.dev  : $PRI"
          echo "mirror github.io  : $MIR"

          crit=0
          if [ "$PUB" = "000" ]; then
            echo "::error::izz.ro NU raspunde deloc — DNS/edge/registrar cazut, outage total"
            crit=1
          elif [ "$PUB" != "200" ]; then
            echo "::warning::izz.ro edge viu dar a raspuns $PUB runnerului (bot-block CF, benign pentru useri)"
          fi
          if [ "$PRI" != "200" ] && [ "$MIR" != "200" ]; then
            echo "::error::REDUNDANTA PIERDUTA — ambele origini jos (primar $PRI, mirror $MIR)"
            crit=1
          elif [ "$PRI" != "200" ]; then
            echo "::warning::primar Cloudflare jos ($PRI) — mirror-ul acopera"
          elif [ "$MIR" != "200" ]; then
            echo "::warning::mirror jos ($MIR) — de reparat, redundanta degradata"
          fi
          exit $crit
