name: uptime-monitor

# Detectie externa, independenta de infrastructura de servire: ruleaza pe GitHub,
# verifica cele trei suprafete la 10 min. Alerteaza (job rosu -> email owner) DOAR
# cand siteul public e jos SAU ambele host-uri sunt jos (redundanta pierduta complet).
# Un singur host jos cat timp izz.ro public raspunde = degradare tolerata (Worker-ul de
# failover o acopera) -> doar avertisment, job verde, fara spam.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: monitor
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Verifica public + primar + mirror
        shell: bash
        run: |
          set +e   # fara -e: liniile conditionale nu trebuie sa avorteze scriptul
          # UA de browser real: Cloudflare bot-fight-mode da 403 pe UA-uri evident de bot,
          # desi siteul e 200 pentru useri. Retry x3 -> tolereaza un challenge tranzitoriu.
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"
          probe() {
            local code
            for _ in 1 2 3; do
              code=$(curl -sL -o /dev/null -w "%{http_code}" --max-time 25 -A "$UA" "$1" 2>/dev/null)
              [ "$code" = "200" ] && break
              sleep 5
            done
            echo "${code:-000}"
          }
          PUB=$(probe "https://izz.ro/")
          PRI=$(probe "https://izz-ro.pages.dev/")
          MIR=$(probe "https://ramanul.github.io/")
          echo "public izz.ro     : $PUB"
          echo "primar pages.dev  : $PRI"
          echo "mirror github.io  : $MIR"

          crit=0
          if [ "$PUB" != "200" ]; then
            echo "::error::SITE PUBLIC JOS — izz.ro a raspuns $PUB"
            crit=1
          fi
          if [ "$PRI" != "200" ] && [ "$MIR" != "200" ]; then
            echo "::error::REDUNDANTA PIERDUTA — ambele host-uri jos (primar $PRI, mirror $MIR)"
            crit=1
          elif [ "$PRI" != "200" ]; then
            echo "::warning::primar Cloudflare jos ($PRI) — mirror-ul acopera"
          elif [ "$MIR" != "200" ]; then
            echo "::warning::mirror jos ($MIR) — de reparat, redundanta degradata"
          fi
          exit $crit
