name: smoke-live

# Verifica SITE-UL LIVE dupa fiecare ciclu de deploy: regulile de format ale
# ownerului (CLAUDE.md sectiunea 7) trebuie sa fie vizibile pe izz.ro, nu doar in cod.
# Pipeline-ul ruleaza la :00 -> deploy ~:05-:10 -> smoke la :45. La FAIL, GitHub
# anunta ownerul automat.

on:
  schedule:
    - cron: "45 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write   # temporar: pasul de fonturi (dispatch-only) comite static/fonts

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python tools/smoke_live.py
        env:
          BASE_URL: https://izz.ro

      # temporar (doar dispatch manual): descarca fonturile si comite-le pe branch
      - name: Fonturi self-hosted (o data)
        if: github.event_name == 'workflow_dispatch'
        run: |
          python tools/fetch_fonts.py
          git config user.name "izz-bot"
          git config user.email "bot@izz.ro"
          git add static/fonts static/fonts.css
          git commit -m "chore(fonts): self-hosted woff2 (latin + latin-ext)" || echo "nimic de comis"
          git push || echo "nimic de impins"
