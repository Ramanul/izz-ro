name: smoke-live

# Verifica SITE-UL LIVE dupa fiecare ciclu de deploy: regulile de format ale
# ownerului (CLAUDE.md sectiunea 7) trebuie sa fie vizibile pe izz.ro, nu doar in cod.
# Pipeline-ul ruleaza la :00 -> deploy ~:05-:10 -> smoke la :45. La FAIL, GitHub
# anunta ownerul automat.

on:
  schedule:
    - cron: "45 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python tools/smoke_live.py
        env:
          BASE_URL: https://izz.ro

      # Diagnostic (doar la rulare manuala): analizeaza mostre art/cover de pe LIVE
      # cu PIL si tipareste statistici -- luminozitate + procent pixeli aurii
      # (icoana + arcele sunt aurii). Aur ~0 => arta e goala (doar gradient inchis).
      - name: Analiza mostre live (diag)
        if: always() && github.event_name == 'workflow_dispatch'
        run: |
          pip install pillow >/dev/null
          python3 - <<'PY'
          import re, io, urllib.request
          from PIL import Image
          BASE = "https://izz.ro"
          UA = {"User-Agent": "izz-smoke/1.0 (+https://izz.ro)"}
          def _get(u):
              return urllib.request.urlopen(urllib.request.Request(u, headers=UA), timeout=30).read()
          def gold_stats(d):
              im = Image.open(io.BytesIO(d)).convert("RGB")
              px = im.getdata(); n = len(px); gold = bright = 0
              for r, g, b in px:
                  bright += (r + g + b)
                  if r > 120 and 90 < g < 210 and b < 110 and r >= g >= b:
                      gold += 1
              return im.size, round(bright / (n * 3), 1), round(gold * 100 / n, 2)
          sm = _get(BASE + "/sitemap.xml").decode("utf-8", "replace")
          locs = [u for u in re.findall(r"<loc>([^<]+)</loc>", sm)
                  if u.rstrip("/").count("/") >= 4 and "/legal/" not in u]
          got = 0
          for u in locs:
              path = re.sub(r"^https?://[^/]+", "", u).rstrip("/")
              try:
                  for kind in ("art", "cover"):
                      d = _get(f"{BASE}{path}/{kind}.jpg")
                      size, bright, gold = gold_stats(d)
                      print(f"{kind:5} {size} bright={bright:5} gold%={gold:5}  {path}")
                  got += 1
              except Exception as e:
                  print("skip", path, e)
              if got >= 4:
                  break
          PY
