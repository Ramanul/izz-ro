name: tests

# Suita minima pytest (functii pure: util/state/cluster/config). Ruleaza pe PR-uri
# si manual -- NU pe commit-urile de continut la 2h (ating doar data/*.json).
on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt pytest
      - run: python -m pytest tests/ -q
      - name: Sanatatea surselor RSS (doar la rulare manuala; PR-urile raman hermetice)
        # per sursa: HTTP / numar intrari / prospetime — prinde si feed-uri care raspund
        # 200 dar nu-s RSS. Nu ruleaza pe PR ca sa nu faca testele dependente de retea.
        # NON-BLOCANT: sanatatea feed-urilor (429 tranzitoriu, sursa moarta) NU trebuie sa
        # pice check-ul de COD "pytest". Poarta autoritara pt. feed-uri e feedcheck.yml.
        if: github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: python tools/feed_check.py
