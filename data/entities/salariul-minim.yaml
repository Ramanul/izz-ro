faq:
  - q: "Când intră în vigoare noul salariu minim?"
    a: "De regulă la 1 ianuarie a fiecărui an, după publicarea hotărârii de guvern în Monitorul Oficial."
  - q: "Se aplică salariul minim și la normă parțială?"
    a: "Da, proporțional cu timpul lucrat. Pentru 4 ore/zi, salariul minim este jumătate din valoarea pentru normă întreagă."
  - q: "Ce amenzi riscă angajatorii care nu plătesc salariul minim?"
    a: "Între 3.000 și 5.000 lei pentru fiecare angajat plătit sub salariul minim. Amenda se aplică de către Inspecția Muncii."
  - q: "Salariul minim include și sporurile?"
    a: "Nu. Sporurile (noapte, weekend, ore suplimentare) se adaugă peste salariul minim."

